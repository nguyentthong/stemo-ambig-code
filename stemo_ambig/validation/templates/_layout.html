<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>STEMO-Ambig validation</title>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --accent: #2563eb;
    --bg-card: #fafafa;
    --bg-warn: #fff7e0;
    --bg-ok: #ecfdf5;
    --bg-bad: #fef2f2;
  }
  * { box-sizing: border-box; }
  body { font: 14px/1.45 system-ui, -apple-system, sans-serif; color: var(--fg); margin: 0; padding: 0; }
  .container { max-width: 1100px; margin: 0 auto; padding: 1.2rem 1.5rem; }
  header { border-bottom: 1px solid var(--border); padding: 0.9rem 1.5rem; background: #fff; position: sticky; top: 0; z-index: 10; }
  header .row { display: flex; align-items: center; gap: 1.2rem; justify-content: space-between; }
  header h1 { font-size: 16px; margin: 0; }
  .progress-wrap { flex: 1; max-width: 480px; }
  .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .progress-text { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .nav-buttons a, .nav-buttons span { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; text-decoration: none; color: var(--fg); }
  .nav-buttons a:hover { background: #f5f5f5; }
  .nav-buttons span.disabled { color: #bbb; }
  h2 { margin-top: 1.4rem; font-size: 18px; }
  .video-wrap { background: #000; max-width: 100%; border-radius: 6px; overflow: hidden; }
  video { width: 100%; display: block; max-height: 480px; }
  .question { font-size: 22px; font-weight: 600; margin: 1.2rem 0 0.4rem; }
  .meta { color: var(--muted); font-size: 12px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.1rem; margin-bottom: 0.9rem; }
  .interp-id { font-weight: 600; color: var(--accent); }
  .span-btn { display: inline-block; font: 12px/1 monospace; padding: 3px 7px; margin: 0 4px 4px 0; border: 1px solid var(--border); border-radius: 3px; background: #fff; cursor: pointer; }
  .span-btn:hover { background: #f0f8ff; border-color: var(--accent); }
  .rewrite { font-style: italic; color: #333; }
  .anchor-block { background: var(--bg-warn); }
  details summary { cursor: pointer; font-weight: 600; }
  details pre { font-size: 11px; max-height: 360px; overflow: auto; background: #fff; padding: 0.6rem; border: 1px solid var(--border); border-radius: 4px; }
  form .field-row { display: flex; gap: 1.5rem; margin: 0.6rem 0; align-items: center; flex-wrap: wrap; }
  form label { font-weight: 500; }
  form .radio-group { display: flex; gap: 0.8rem; }
  form input[type="radio"] { margin-right: 4px; }
  form textarea, form input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 13px; }
  form textarea { min-height: 60px; resize: vertical; }
  .btn-primary, .btn-secondary { display: inline-block; padding: 9px 16px; border-radius: 5px; border: 1px solid var(--accent); font-size: 14px; cursor: pointer; text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1e40af; }
  .btn-secondary { background: #fff; color: var(--accent); }
  .btn-secondary:hover { background: #f0f8ff; }
  .form-actions { display: flex; gap: 0.6rem; margin-top: 1.2rem; }
  .existing-notice { background: var(--bg-ok); border: 1px solid #6ee7b7; padding: 0.5rem 0.8rem; border-radius: 4px; margin: 0.9rem 0; font-size: 13px; }
  .ambiguity-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; background: #ede9fe; color: #5b21b6; margin-left: 6px; }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>STEMO-Ambig validation</h1>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width: {{ progress.pct }}%"></div></div>
      <div class="progress-text">
        {{ progress.done }} of {{ progress.total }} validated
        ({{ "%.1f"|format(progress.pct) }}%) — {{ progress.remaining }} remaining
        {% if idx is defined %}| Current: #{{ idx + 1 }} of {{ n }}{% endif %}
      </div>
    </div>
    {% block nav %}{% endblock %}
  </div>
</header>
<div class="container">
  {% block body %}{% endblock %}
</div>
</body>
</html>
