# LoRA SFT v3 — middle-ground recipe.
#
# Hypothesis: v2's data composition is right (preserves capability +1.6 to +2.1pp)
# but under-trained on the ambig behavior (only 1 epoch at LR 1e-5).
# V3 keeps the data and bumps training: LR 5e-5 (half of LoRA-optimal 1e-4), 2 epochs.

model:
  model_id: Qwen/Qwen3-VL-32B-Thinking
  trust_remote_code: true
  torch_dtype: bfloat16

data:
  train_file: /home/thong/weride_project/weride/overthinking_hallu/data_v0/stemo_ambig_sft_v2/sft_train.jsonl
  dev_file:   /home/thong/weride_project/weride/overthinking_hallu/data_v0/stemo_ambig_sft_v2/sft_dev.jsonl
  max_seq_len: 2048
  video_fps: 1.0
  video_max_frames: 16

lora:
  r: 128
  alpha: 128
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: /home/thong/weride_project/weride/overthinking_hallu/checkpoints/qwen3vl32b_stemo_ambig_lora_v3
  num_train_epochs: 2                    # v2 → v3: 1 → 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5                   # v2 → v3: 1e-5 → 5e-5 (half of LoRA-optimal 1e-4)
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 5
  eval_steps: 50
  save_steps: 100
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  ddp_find_unused_parameters: false
  remove_unused_columns: false
  report_to: tensorboard
  logging_dir: /home/thong/weride_project/weride/overthinking_hallu/checkpoints/qwen3vl32b_stemo_ambig_lora_v3/runs
  seed: 0
